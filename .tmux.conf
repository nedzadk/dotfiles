# Set base session number to 1 instead of 0
set -g base-index 1
# Escape delay to 0 (needed for (n)vim)
set -sg escape-time 0
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set-window-option -g mode-keys vi

bind . split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

unbind '"'
unbind %

bind r source-file ~/.tmux.conf

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# to cycle through windows
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on
set -g renumber-windows on

# Set spaceduck scheme
# Default bar color

# This tmux statusbar config was created by tmuxline.vim
# https://github.com/edkolev/tmuxline.vim

set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"

# Middle section
set -g message-command-style "fg=#1b1c36,bg=#686f9a"
set -g status-right-style "none"
set -g status-style "none,bg=#0f111b"

# Active border on pane
set -g pane-active-border-style "fg=#5ccc96"

# When commands are run
set -g message-style "fg=#0f111b,bg=#b3a1e6"

# Inactive border on pane
set -g pane-border-style "fg=#686f9a"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none"

# Separator colors
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#686f9a,bg=#30365F"

# Left
set -g status-left "#[fg=#686f9a,bg=#0f111b] #S #[fg=#0f111b,bg=#0f111b,nobold,nounderscore,noitalics]"

# Right
set -g status-right "#[fg=#0f111b,bg=#0f111b,nobold,nounderscore,noitalics]#[fg=#686f9a,bg=#0f111b] %d-%m-%Y  %H:%M #[fg=#0f111b,bg=#0f111b,nobold,nounderscore,noitalics]"
# Inactive window
setw -g window-status-format "#[fg=#686f9a,bg=#0f111b] #I #[fg=#686f9a,bg=#0f111b] #W "

# Active window
setw -g window-status-current-format "#[fg=#0f111b,bg=#1b1c36,nobold,nounderscore,noitalics]#[fg=#686f9a,bg=#1b1c36] #I #[fg=#686f9a,bg=#1b1c36] #W #[fg=#1b1c36,bg=#0f111b,nobold,nounderscore,noitalics]"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin "arcticicestudio/nord-tmux"
# set -g @plugin 'egel/tmux-gruvbox'
# set -g @tmux-gruvbox 'dark'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
