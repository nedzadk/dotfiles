env:
  TERM: xterm-256color

font:
  size: 20
  normal:
    family: "ProggyCleanTTSZ"
  bold:
    family: "ProggyCleanTTSZ"
  italic:
    family: "ProggyCleanTTSZ"
  use_thin_strokes: true
window:
  padding:
    x: 0
    y: 0
  decorations: full

draw_bold_text_with_bright_colors: true

cursor:
  style: Block
  thickness: 0.30

mouse:
  hide_when_typing: false

